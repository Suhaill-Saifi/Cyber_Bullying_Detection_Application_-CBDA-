# SafeChat Docker Compose
# version: field removed — it's obsolete in Docker Compose v2+
#
# Start server:  docker compose up -d server
# Join chat:     docker compose run --rm client   (new terminal per user)

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: safechat-server:latest
    container_name: safechat-server
    restart: unless-stopped
    ports:
      - "12345:12345"
    volumes:
      - ./models:/app/models:ro
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "12345"
      MODELS_DIR:  "/app/models"
    networks:
      - safechat-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/12345' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    image: safechat-client:latest
    stdin_open: true
    tty: true
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./models:/app/models:ro
    environment:
      SERVER_HOST: "server"
      SERVER_PORT: "12345"
      MODELS_DIR:  "/app/models"
    networks:
      - safechat-net
    profiles:
      - client

networks:
  safechat-net:
    driver: bridge